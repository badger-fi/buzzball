function fmtTime(t) {
  const parts = t.split(":");
  const h = parseInt(parts[0]);
  const m = parts[1];
  const ampm = h >= 12 ? "PM" : "AM";
  const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return h12 + ":" + m + " " + ampm;
}

function fmtDate(d) {
  return new Date(d + "T12:00").toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
}

function pad(n) { return String(n).padStart(2, "0"); }

function getNext(now) {
  for (const g of SCHEDULE) {
    const dt = new Date(g.date + "T" + g.time + ":00");
    if (dt > now) return { ...g, dt };
  }
  return null;
}

  return [

  ];

function randomGame() {
  const opps = SCHEDULE.filter(function(g) { return g.home; }).map(function(g) { return g.opponent; });
  const opp = opps[Math.floor(Math.random() * opps.length)];
  const half = Math.random() > 0.5 ? "top" : "bot";
  const batterPool  = half === "top" ? OPP_BATTERS  : HORNETS_BATTERS;
  const pitcherPool = half === "top" ? HORNETS_PITCHERS : OPP_PITCHERS;
  const runners = randomRunners(batterPool);
  const batter  = pick(batterPool);
  const pitcher = pick(pitcherPool);
  return {
    home: "Hornets",
    away: opp,
    homeScore: Math.floor(Math.random() * 6),
    awayScore: Math.floor(Math.random() * 6),
    inning: Math.floor(Math.random() * 7) + 1,
    half: half,
    balls: Math.floor(Math.random() * 4),
    strikes: Math.floor(Math.random() * 3),
    outs: Math.floor(Math.random() * 3),
    runners: runners,
    batter: batter,
    pitcher: pitcher,
    pitches: Math.floor(Math.random() * 60) + 20,
  };
}

function InningLabel(n) {
  if (n === 1) return "1st";
  if (n === 2) return "2nd";
  if (n === 3) return "3rd";
  return n + "th";
}

function BaseDiamond(props) {
  const runners = props.runners || [null, null, null];
  const sz = 88;
  const cx = sz / 2, cy = sz / 2;
  const r = 28;
  // base positions: 0=1st(right), 1=2nd(top), 2=3rd(left)
  const bases = [
    { x: cx + r, y: cy,     label: runners[0] },
    { x: cx,     y: cy - r, label: runners[1] },
    { x: cx - r, y: cy,     label: runners[2] },
  ];
  return (
    <svg width={sz} height={sz} viewBox={"0 0 " + sz + " " + sz} style={{ flexShrink:0 }}>
      {/* diamond lines */}
      <polygon
        points={[
          cx + "," + (cy + r),
          (cx + r) + "," + cy,
          cx + "," + (cy - r),
          (cx - r) + "," + cy,
        ].join(" ")}
        fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1"
      />
      {/* home plate dot */}
      <circle cx={cx} cy={cy + r} r="4" fill="white" opacity="0.5"/>
      {/* bases */}
      {bases.map(function(b, i) {
        const on = !!b.label && typeof b.label === "object";
        const labelText = on ? (b.label.short || "") : "";
        return (
          <g key={i}>
            <rect
              x={b.x - 7} y={b.y - 7} width="14" height="14"
              fill={on ? "#f5c030" : "rgba(255,255,255,0.12)"}
              stroke={on ? "#e09820" : "rgba(255,255,255,0.35)"}
              strokeWidth="1.2"
              transform={"rotate(45," + b.x + "," + b.y + ")"}
            />
            {on && (
              <text
                x={i === 0 ? b.x + 13 : i === 2 ? b.x - 13 : b.x}
                y={i === 1 ? b.y - 13 : b.y + 4}
                textAnchor={i === 0 ? "start" : i === 2 ? "end" : "middle"}
                fill="#f5c030" fontSize="7" fontFamily="monospace" fontWeight="700"
              >{labelText}</text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

function Scoreboard(props) {
  const game = props.game;
  const runners = game.runners || [null, null, null];
  const onBase = runners.filter(function(r) { return !!r; }).length;
  return (
    <div style={{ background:"rgba(0,8,32,0.97)", borderTop:"2px solid " + RED }}>

      {/* ── Row 1: LIVE badge + inning + pitch count ── */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 12px 6px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <div style={{ background:RED, borderRadius:3, padding:"2px 7px", fontSize:9, letterSpacing:2, fontFamily:"monospace", color:"white" }}>LIVE</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.8)", fontFamily:"monospace", fontWeight:700 }}>
            {game.half === "top" ? "▲" : "▼"} {InningLabel(game.inning)}
          </div>
        </div>
        <div style={{ fontSize:9, color:"rgba(255,255,255,0.4)", fontFamily:"monospace" }}>
          {game.pitches} pitches
        </div>
      </div>

      {/* ── Row 2: Score ── */}
      <div style={{ display:"flex", gap:0, borderTop:"1px solid rgba(255,255,255,0.06)", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
        {[
          { name: game.away, score: game.awayScore, active: game.half === "top" },
          { name: game.home, score: game.homeScore, active: game.half === "bot" },
        ].map(function(row, i) {
          return (
            <div key={i} style={{
              flex:1, display:"flex", justifyContent:"space-between", alignItems:"center",
              padding:"6px 12px",
              background: row.active ? "rgba(213,0,43,0.08)" : "transparent",
              borderRight: i === 0 ? "1px solid rgba(255,255,255,0.06)" : "none"
            }}>
              <div style={{ fontSize:11, color: row.active ? "white" : "rgba(255,255,255,0.55)", fontFamily:"monospace", fontWeight: row.active ? 700 : 400 }}>
                {row.name}
                {row.active && <span style={{ fontSize:8, color:RED, marginLeft:4 }}>BAT</span>}
              </div>
              <div style={{ fontSize:22, fontWeight:700, color: row.active ? "white" : "rgba(255,255,255,0.6)", fontFamily:"monospace" }}>
                {row.score}
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Row 2.5: Last play narrative (live only) ── */}
      {game.lastPlay && (
        <div style={{ padding:"4px 12px", borderTop:"1px solid rgba(255,255,255,0.05)", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
          <div style={{ fontSize:9, color:"rgba(255,255,255,0.35)", fontFamily:"monospace", letterSpacing:1, marginBottom:1 }}>LAST PLAY</div>
          <div style={{ fontSize:10, color:"rgba(255,255,255,0.7)", fontFamily:"monospace", lineHeight:1.4 }}>{game.lastPlay}</div>
        </div>
      )}

      {/* ── Row 3: Diamond + count + players ── */}
      <div style={{ display:"flex", alignItems:"center", padding:"8px 12px", gap:10 }}>

        {/* Base diamond with runner names */}
        <BaseDiamond runners={runners} />

        {/* Middle: balls/strikes/outs */}
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", gap:4, marginBottom:6 }}>
            {["B","S","O"].map(function(label, li) {
              const max = [4,3,3][li];
              const val = [game.balls, game.strikes, game.outs][li];
              const color = li === 2 ? "#ff6060" : "#f5c030";
              return (
                <div key={label} style={{ flex:1, textAlign:"center" }}>
                  <div style={{ fontSize:7, color:"rgba(255,255,255,0.35)", fontFamily:"monospace", letterSpacing:1, marginBottom:2 }}>{label}</div>
                  <div style={{ display:"flex", gap:2, justifyContent:"center" }}>
                    {Array.from({ length: max }).map(function(_, di) {
                      return (
                        <div key={di} style={{
                          width:8, height:8, borderRadius:"50%",
                          background: di < val ? color : "rgba(255,255,255,0.12)",
                          border:"1px solid " + (di < val ? color : "rgba(255,255,255,0.2)")
                        }}/>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
          {onBase > 0 && (
            <div style={{ fontSize:8, color:"rgba(255,255,255,0.3)", fontFamily:"monospace", textAlign:"center" }}>
              {onBase} on base
            </div>
          )}
        </div>

        {/* Right: pitcher + batter */}
        <div style={{ minWidth:80, maxWidth:"30%" }}>
          <div style={{ marginBottom:6 }}>
            <div style={{ fontSize:7, letterSpacing:1, color:"rgba(255,255,255,0.3)", fontFamily:"monospace", textTransform:"uppercase", marginBottom:2 }}>Pitching</div>
            <div style={{ fontSize:11, color:"#7ab8e8", fontFamily:"monospace", fontWeight:700 }}>{game.pitcher ? game.pitcher.short : ""}</div>
          </div>
          <div>
            <div style={{ fontSize:7, letterSpacing:1, color:"rgba(255,255,255,0.3)", fontFamily:"monospace", textTransform:"uppercase", marginBottom:2 }}>At Bat</div>
            <div style={{ fontSize:11, color:"#f5c030", fontFamily:"monospace", fontWeight:700 }}>{game.batter ? game.batter.short : ""}</div>
          </div>
        </div>
      </div>

    </div>
  );
}

function Countdown(props) {
  const nextGame = props.nextGame;
  const [diff, setDiff] = useState(0);

  useEffect(function() {
    if (!nextGame) return;
    function tick() { setDiff(Math.max(0, nextGame.dt - Date.now())); }
    tick();
    const id = setInterval(tick, 1000);
    return function() { clearInterval(id); };
  }, [nextGame]);

  if (!nextGame) {
    return (
      <div style={{ background:"rgba(0,10,40,0.95)", padding:"14px 12px", borderTop:"2px solid " + NAVY, textAlign:"center" }}>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", fontFamily:"monospace" }}>Season complete</div>
      </div>
    );
  }

  const s = Math.floor(diff / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const units = [["D", d], ["H", h], ["M", m], ["S", sec]];

  return (
    <div style={{ background:"rgba(0,10,40,0.95)", padding:"12px", borderTop:"2px solid " + NAVY }}>
      <div style={{ fontSize:9, letterSpacing:2, color:"rgba(255,255,255,0.4)", fontFamily:"monospace", textTransform:"uppercase", marginBottom:6 }}>Next game</div>
      <div style={{ fontSize:12, color:CHALK, fontFamily:"monospace", marginBottom:8 }}>
        {nextGame.home ? "vs " : "@ "}{nextGame.opponent} — {fmtDate(nextGame.date)} {fmtTime(nextGame.time)}
      </div>
      <div style={{ display:"flex", gap:8 }}>
        {units.map(function(u) {
          return (
            <div key={u[0]} style={{ textAlign:"center" }}>
              <div style={{ fontSize:18, fontWeight:700, color:"white", fontFamily:"monospace", lineHeight:1 }}>{pad(u[1])}</div>
              <div style={{ fontSize:8, color:"rgba(255,255,255,0.4)", fontFamily:"monospace", letterSpacing:1 }}>{u[0]}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BuzzBall() {
  useEffect(function() {
    var meta = document.querySelector("meta[name=viewport]");
    if (!meta) { meta = document.createElement("meta"); meta.name = "viewport"; document.head.appendChild(meta); }
    meta.content = "width=device-width, initial-scale=1, maximum-scale=1";
  }, []);
  const [tab, setTab] = useState("home");
  const [phone, setPhone] = useState("");
  const [subscribed, setSubscribed] = useState(false);
  const [alerts, setAlerts] = useState([]);
  const [liveGame, setLiveGame] = useState(null);
  const [simInterval, setSimInterval] = useState(null);
  const prevGameRef = useRef(null);
  const [apiDebug, setApiDebug] = useState(null);

  const now = new Date();
  const nextGame = getNext(now);
  const upcoming = SCHEDULE.filter(function(g) { return new Date(g.date + "T" + g.time + ":00") > now; });
  const past = SCHEDULE.filter(function(g) { return new Date(g.date + "T" + g.time + ":00") <= now; }).reverse();

  const digits = phone.replace(/\D/g, "");
  const phoneValid = digits.length === 10;

  // Fire alerts when game state changes
  useEffect(function() {
    if (!liveGame) return;
    var prev = prevGameRef.current;
    if (!prev) { prevGameRef.current = liveGame; return; }

    var half = liveGame.half === "top" ? "Top" : "Bot";
    var prevHalf = prev.half === "top" ? "Top" : "Bot";

    // Score change
    if (liveGame.homeScore !== prev.homeScore) {
      var scorer = liveGame.batter ? liveGame.batter.short : "Hornets";
      addAlert("⚾ SCORE: " + scorer + " scores! Hornets " + liveGame.homeScore + ", " + liveGame.away + " " + liveGame.awayScore, "score");
    } else if (liveGame.awayScore !== prev.awayScore) {
      addAlert("⚾ SCORE: " + liveGame.away + " scores. " + liveGame.away + " " + liveGame.awayScore + ", Hornets " + liveGame.homeScore, "score");
    }

    // Inning change
    if (liveGame.inning !== prev.inning || liveGame.half !== prev.half) {
      var pitcherName = liveGame.pitcher ? liveGame.pitcher.short : "—";
      var batterName  = liveGame.batter  ? liveGame.batter.short  : "—";
      var battingTeam = liveGame.half === "top" ? liveGame.away : "Hornets";
      var fieldingTeam = liveGame.half === "top" ? "Hornets" : liveGame.away;
      addAlert(
        half + " " + liveGame.inning + " | " + battingTeam + " bat | P: " + pitcherName + " (" + fieldingTeam + ") | AB: " + batterName,
        "inning"
      );
    }

    // Last play narrative change
    if (liveGame.lastPlay && liveGame.lastPlay !== prev.lastPlay) {
      addAlert("▶ " + liveGame.lastPlay, "play");
    }

    prevGameRef.current = liveGame;
  }, [liveGame]);

  function addAlert(msg, type) {
    setAlerts(function(prev) {
      return [{ id: Date.now() + Math.random(), msg: msg, type: type, ts: new Date() }].concat(prev).slice(0, 30);
    });
  }

  // Parse clean JSON from Cloudflare Worker into game state shape
  function parseSidearm(data) {
    try {
      if (!data || !data.live) return null;
      var r = data.runners || {};

      // Try to match a full name to a roster player, fall back to a name-only object
      function findPlayer(pool, fullName) {
        if (!fullName) return pick(pool);
        var last = fullName.trim().split(/\s+/).pop().toLowerCase();
        var found = pool.find(function(p) { return p.name && p.name.toLowerCase().includes(last); });
        if (found) return found;
        // Not on roster (opponent player) — return display-only object
        var parts = fullName.trim().split(/\s+/);
        var short = parts.length >= 2 ? parts[0][0] + ". " + parts[parts.length - 1] : fullName;
        return { name: fullName, short: short, pos: "?", photo: null };
      }

      var battingPool = data.half === "top" ? OPP_BATTERS : HORNETS_BATTERS;
      var pitchPool   = data.half === "top" ? HORNETS_PITCHERS : OPP_PITCHERS;

      return {
        home: "Hornets",
        away: data.opponent || "Opponent",
        homeScore: data.suScore  || 0,
        awayScore: data.oppScore || 0,
        inning:  data.inning  || 1,
        half:    data.half    || "top",
        outs:    data.outs    || 0,
        balls:   data.balls   || 0,
        strikes: data.strikes || 0,
        pitches: data.pitchCount || 0,
        runners: [
          r.first  ? {short: r.r1name || "Runner"} : null,
          r.second ? {short: r.r2name || "Runner"} : null,
          r.third  ? {short: r.r3name || "Runner"} : null,
        ],
        batter:   findPlayer(battingPool, data.batter),
        pitcher:  findPlayer(pitchPool,   data.pitcher),
        onDeck:   data.onDeck  || null,
        lastPlay: data.lastPlay || null,
        suRecord: data.suRecord || null,
        periodScores: data.periodScores || null,
        live: true,
      };
    } catch(e) { return null; }
  }

  function fetchSidearm() {
    return fetch(PROXY_URL).then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    });
  }

  function startSimLoop(game) {
    const id = setInterval(function() {
      setLiveGame(function(prev) {
        if (!prev) return null;
        var next = {
          home: prev.home, away: prev.away,
          homeScore: prev.homeScore, awayScore: prev.awayScore,
          inning: prev.inning, half: prev.half,
          balls: prev.balls, strikes: prev.strikes, outs: prev.outs,
          runners: prev.runners ? prev.runners.slice() : [null, null, null],
          batter: prev.batter, pitcher: prev.pitcher, pitches: prev.pitches,
          live: prev.live,
        };
        var r = Math.random();
        if (r < 0.15) {
          if (Math.random() > 0.5) { next.homeScore = next.homeScore + 1; }
          else { next.awayScore = next.awayScore + 1; }
        } else if (r < 0.3) {
          if (next.inning < 9) next.inning = next.inning + 1;
          next.half = next.half === "top" ? "bot" : "top";
        }
        next.balls   = Math.floor(Math.random() * 4);
        next.strikes = Math.floor(Math.random() * 3);
        next.outs    = Math.floor(Math.random() * 3);
        var battingPool = next.half === "top" ? OPP_BATTERS : HORNETS_BATTERS;
        var pitchPool   = next.half === "top" ? HORNETS_PITCHERS : OPP_PITCHERS;
        next.runners = randomRunners(battingPool);
        next.batter  = pick(battingPool) || prev.batter;
        next.pitcher = pick(pitchPool)   || prev.pitcher;
        next.pitches = next.pitches + Math.floor(Math.random() * 3) + 1;
        return next;
      });
    }, 2000);
    setSimInterval(id);
  }

  function startSim() {
    addAlert("🔍 Checking for live game...", "info");
    // Try to fetch real live data from SIDEARM
    fetchSidearm()
      .then(function(data) {
        // Store raw response so user can see the structure
        setApiDebug(data);
        var liveData = parseSidearm(data);
        if (liveData) {
          setLiveGame(liveData);
          addAlert("📡 LIVE: Hornets vs " + liveData.away + " | Inn " + liveData.inning + " | " + liveData.homeScore + "-" + liveData.awayScore, "score");
          // Poll real data every 20s
          const id = setInterval(function() {
            fetchSidearm()
              .then(function(d) {
                var updated = parseSidearm(d);
                if (updated) setLiveGame(updated);
              })
              .catch(function() {});
          }, 20000);
          setSimInterval(id);
        } else {
          // No live game — fall back to simulation
          addAlert("📭 No live game right now — running simulation", "info");
          var game = randomGame();
          game.live = false;
          setLiveGame(game);
          var startPitcher = game.pitcher ? game.pitcher.short : "—";
          var startBatter  = game.batter  ? game.batter.short  : "—";
          addAlert("▶ SIM: Hornets vs " + game.away + " | P: " + startPitcher + " | AB: " + startBatter, "info");
          startSimLoop(game);
        }
      })
      .catch(function() {
        // Network error or CORS — fall back to simulation
        addAlert("📭 No live game found — running simulation", "info");
        var game = randomGame();
        game.live = false;
        setLiveGame(game);
        var startPitcher = game.pitcher ? game.pitcher.short : "—";
        var startBatter  = game.batter  ? game.batter.short  : "—";
        addAlert("▶ SIM: Hornets vs " + game.away + " | P: " + startPitcher + " | AB: " + startBatter, "info");
        startSimLoop(game);
      });
  }

  function stopSim() {
    if (simInterval) clearInterval(simInterval);
    setSimInterval(null);
    setLiveGame(null);
    addAlert("Simulation ended", "info");
  }

  function handleSubscribe() {
    if (!phoneValid) return;
    setSubscribed(true);
    addAlert("Subscribed for " + phone, "info");
  }

  const tabList = [
    { id:"home", label:"Home" },
    { id:"schedule", label:"Schedule" },
    { id:"alerts", label: alerts.length > 0 ? "Alerts (" + alerts.length + ")" : "Alerts" },
  ];

  return (
    <div style={{ background:NAVY, minHeight:"100vh", color:"white", fontFamily:"system-ui, sans-serif", maxWidth:480, margin:"0 auto" }}>

      <div style={{ background:"#001040", padding:"14px 16px", borderBottom:"2px solid " + RED }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ fontSize:24 }}>⚾</div>
          <div>
            <div style={{ fontSize:16, fontWeight:700, letterSpacing:1 }}>Buzzball.<span style={{ color:RED }}>Live</span></div>
          </div>
          {liveGame && (
            <div style={{ marginLeft:"auto", background: liveGame && liveGame.live ? "#00aa44" : RED, borderRadius:4, padding:"3px 8px", fontSize:9, letterSpacing:2, fontFamily:"monospace" }}>{liveGame && liveGame.live ? "LIVE" : "SIM"}</div>
          )}
        </div>
      </div>

      <div style={{ display:"flex", borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
        {tabList.map(function(t) {
          return (
            <button key={t.id} onClick={function() { setTab(t.id); }} style={{
              flex:1, padding:"10px 4px", border:"none",
              background: tab === t.id ? "rgba(213,0,43,0.15)" : "transparent",
              color: tab === t.id ? RED : "rgba(255,255,255,0.5)",
              borderBottom: tab === t.id ? "2px solid " + RED : "2px solid transparent",
              fontSize:11, fontWeight:600, letterSpacing:1, fontFamily:"monospace",
              textTransform:"uppercase", cursor:"pointer"
            }}>
              {t.label}
            </button>
          );
        })}
      </div>

      {tab === "home" && (
        <div>
          {liveGame ? <Field runners={liveGame.runners} /> : <Field runners={[null,null,null]} />}
          {liveGame ? <Scoreboard game={liveGame} /> : <Countdown nextGame={nextGame} />}
          <div style={{ padding:"16px" }}>
            {!liveGame ? (
              <button onClick={startSim} style={{ width:"100%", padding:"14px 12px", minHeight:48, background:RED, color:"white", border:"none", borderRadius:8, fontSize:13, fontWeight:700, letterSpacing:1, cursor:"pointer", textTransform:"uppercase" }}>
                Simulate Live Game
              </button>
            ) : (
              <button onClick={stopSim} style={{ width:"100%", padding:"14px 12px", minHeight:48, background:"rgba(255,255,255,0.1)", color:"white", border:"1px solid rgba(255,255,255,0.2)", borderRadius:8, fontSize:13, fontWeight:700, letterSpacing:1, cursor:"pointer", textTransform:"uppercase" }}>
                Stop Simulation
              </button>
            )}
            
            {apiDebug && !liveGame && (
              <div style={{ marginTop:16, background:"rgba(0,40,0,0.5)", borderRadius:10, border:"1px solid rgba(0,255,100,0.15)", padding:"12px 14px" }}>
                <div style={{ fontSize:9, letterSpacing:2, color:"rgba(100,255,150,0.5)", fontFamily:"monospace", textTransform:"uppercase", marginBottom:6 }}>API Response (raw)</div>
                <pre style={{ fontSize:9, color:"rgba(150,255,180,0.8)", fontFamily:"monospace", overflowX:"auto", whiteSpace:"pre-wrap", margin:0 }}>
                  {JSON.stringify(apiDebug, null, 2).slice(0, 2000)}
                </pre>
              </div>
            )}
            {alerts.length > 0 && (
              <div style={{ marginTop:16 }}>
                <div style={{ fontSize:9, letterSpacing:2, color:"rgba(255,255,255,0.35)", fontFamily:"monospace", textTransform:"uppercase", marginBottom:8 }}>SMS Alerts Sent</div>
                <div style={{ background:"rgba(0,10,40,0.8)", borderRadius:10, border:"1px solid rgba(255,255,255,0.07)", overflow:"hidden" }}>
                  {alerts.map(function(a, i) {
                    return (
                      <div key={a.id} style={{ padding:"10px 14px", borderBottom: i < alerts.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none", display:"flex", gap:10, alignItems:"flex-start" }}>
                        <div style={{ fontSize:9, color:"rgba(255,255,255,0.25)", fontFamily:"monospace", whiteSpace:"nowrap", paddingTop:2 }}>
                          {a.ts.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" })}
                        </div>
                        <div style={{ fontSize:12, fontFamily:"monospace", lineHeight:1.4, color: a.type === "score" ? "#ff6680" : a.type === "inning" ? "#7ab8e8" : "rgba(255,255,255,0.55)" }}>
                          {a.msg}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {tab === "schedule" && (
        <div style={{ padding:"14px 14px 40px" }}>
          <div style={{ fontSize:9, letterSpacing:3, color:"rgba(255,255,255,0.4)", fontFamily:"monospace", textTransform:"uppercase", marginBottom:8 }}>
            Upcoming — {upcoming.length} games
          </div>
          <div style={{ background:"rgba(0,10,40,0.7)", borderRadius:10, overflow:"hidden", border:"1px solid rgba(255,255,255,0.07)", marginBottom:20 }}>
            {upcoming.length === 0 && (
              <div style={{ padding:"20px", textAlign:"center", color:"rgba(255,255,255,0.3)", fontSize:12 }}>No upcoming games</div>
            )}
            {upcoming.slice(0, 15).map(function(g, i) {
              const isNext = nextGame && g.date === nextGame.date && g.time === nextGame.time;
              return (
                <div key={i} style={{ padding:"10px 14px", borderBottom: i < upcoming.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", display:"flex", justifyContent:"space-between", alignItems:"center", background: isNext ? "rgba(213,0,43,0.08)" : "transparent" }}>
                  <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                    
                    <div>
                      <div style={{ fontSize:12, color: isNext ? "#ff6680" : CHALK, fontWeight: isNext ? 700 : 400 }}>
                        {g.home ? "vs " : "@ "}{g.opponent}
                      </div>
                      <div style={{ fontSize:9, color:"rgba(255,255,255,0.3)", fontFamily:"monospace" }}>
                        {fmtDate(g.date)}{g.conf ? " · ODAC" : ""}
                      </div>
                    </div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", fontFamily:"monospace" }}>{fmtTime(g.time)}</div>
                    {isNext && <div style={{ fontSize:8, color:RED, fontFamily:"monospace", letterSpacing:1 }}>NEXT</div>}
                  </div>
                </div>
              );
            })}
          </div>
          {past.length > 0 && (
            <div>
              <div style={{ fontSize:9, letterSpacing:3, color:"rgba(255,255,255,0.4)", fontFamily:"monospace", textTransform:"uppercase", marginBottom:8 }}>Results</div>
              <div style={{ background:"rgba(0,10,40,0.7)", borderRadius:10, overflow:"hidden", border:"1px solid rgba(255,255,255,0.07)" }}>
                {past.slice(0, 8).map(function(g, i) {
                  return (
                    <div key={i} style={{ padding:"9px 14px", borderBottom: i < past.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", display:"flex", justifyContent:"space-between", alignItems:"center", opacity:0.6 }}>
                      <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                        
                        <div>
                          <div style={{ fontSize:11, color:CHALK }}>{g.home ? "vs " : "@ "}{g.opponent}</div>
                          <div style={{ fontSize:9, color:"rgba(255,255,255,0.3)", fontFamily:"monospace" }}>{fmtDate(g.date)}</div>
                        </div>
                      </div>
                      <div style={{ fontSize:10, color: g.result && g.result.startsWith("W") ? "#4ade80" : g.result ? "#ff6680" : "rgba(255,255,255,0.3)", fontFamily:"monospace", fontWeight: g.result ? 700 : 400 }}>{g.result || "Final"}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {tab === "alerts" && (
        <div style={{ padding:"14px 14px 40px" }}>
          {!subscribed ? (
            <div style={{ background:"rgba(0,10,40,0.8)", borderRadius:12, padding:"24px 20px", border:"1px solid rgba(213,0,43,0.2)", textAlign:"center", marginBottom:16 }}>
              <div style={{ fontSize:32, marginBottom:10 }}>📲</div>
              <div style={{ fontSize:14, fontWeight:700, marginBottom:6 }}>Get Live Alerts</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)", lineHeight:1.6, marginBottom:16 }}>
                Get a text for every score change and inning update.
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <input
                  type="tel"
                  placeholder="(555) 867-5309"
                  value={phone}
                  onChange={function(e) { setPhone(e.target.value); }}
                  style={{ flex:1, background:"#001040", border:"2px solid " + (phoneValid ? RED : "#223"), borderRadius:6, padding:"10px 12px", color:"white", fontSize:14, fontFamily:"monospace", outline:"none" }}
                />
                <button
                  onClick={handleSubscribe}
                  disabled={!phoneValid}
                  style={{ background: phoneValid ? RED : "#223", color: phoneValid ? "white" : "rgba(255,255,255,0.3)", border:"none", borderRadius:6, padding:"10px 14px", fontSize:11, fontWeight:700, letterSpacing:1, textTransform:"uppercase", cursor: phoneValid ? "pointer" : "not-allowed", fontFamily:"monospace" }}
                >
                  Subscribe
                </button>
              </div>
            </div>
          ) : (
            <div style={{ background:"rgba(0,30,0,0.4)", borderRadius:10, padding:"12px 14px", border:"1px solid rgba(90,180,90,0.2)", marginBottom:16, textAlign:"center" }}>
              <div style={{ fontSize:12, color:"#5aaa5a", fontFamily:"monospace" }}>Alerts active for {phone}</div>
            </div>
          )}
          {alerts.length > 0 ? (
            <div style={{ background:"rgba(0,10,40,0.8)", borderRadius:10, border:"1px solid rgba(255,255,255,0.07)" }}>
              {alerts.map(function(a, i) {
                return (
                  <div key={a.id} style={{ padding:"10px 14px", borderBottom: i < alerts.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none", display:"flex", gap:10, alignItems:"flex-start" }}>
                    <div style={{ fontSize:9, color:"rgba(255,255,255,0.25)", fontFamily:"monospace", whiteSpace:"nowrap", paddingTop:2 }}>
                      {a.ts.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" })}
                    </div>
                    <div style={{ fontSize:12, fontFamily:"monospace", lineHeight:1.4, color: a.type === "score" ? "#ff6680" : a.type === "inning" ? "#7ab8e8" : "rgba(255,255,255,0.5)" }}>
                      {a.msg}
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div style={{ textAlign:"center", padding:"40px 0", color:"rgba(255,255,255,0.2)", fontFamily:"monospace", fontSize:12 }}>
              No alerts yet — simulate a game on the Home tab.
            </div>
          )}
        </div>
      )}

      <style>{"* { box-sizing: border-box; } button:active { opacity: 0.8; }"}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BuzzBall />);
  </script>
</body>
</html>
